<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0806">
<title>T-bane</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100vh;
  background:radial-gradient(ellipse at top,#1a1410 0%,#0a0806 55%,#000 100%);
  background-attachment:fixed;
  color:#f5b840;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  -webkit-font-smoothing:antialiased;
}
body{padding:max(1rem,env(safe-area-inset-top)) 1rem max(1.5rem,env(safe-area-inset-bottom))}
.wrap{max-width:34rem;margin:0 auto}

/* ── TYPE SCALE ── */
.num{font-family:"Bebas Neue",sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
.muted{color:#57534e}
.soft{color:#a8a29e}
.amber{color:#f5b840}
.warn{color:#fbbf24}
.go{color:#f97316}
.ok{color:#4ade80}
.dim{opacity:.3}

/* ── SHARED ── */
.line-badge{
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;padding:0.15rem 0.45rem;
  color:#fff;border-radius:3px;min-width:1.4rem;flex-shrink:0;
}
.nav-back{
  display:inline-flex;align-items:center;gap:.4rem;
  background:none;border:none;
  color:#78716c;font-family:inherit;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.5rem 0;cursor:pointer;min-height:44px;
}
.nav-back:active{color:#f5b840}

/* ── SCREEN 1: BOARD ── */
.board-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:.75rem;
  border-bottom:1px solid rgba(245,184,64,.08);
  margin-bottom:.1rem;
}
.station-name{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(2rem,8vw,2.8rem);
  letter-spacing:.04em;line-height:1;
  color:#f5b840;
  text-shadow:0 0 20px rgba(245,184,64,.4),0 0 40px rgba(245,184,64,.15);
}
.dir-btn{
  display:flex;align-items:center;gap:.4rem;
  background:none;border:none;
  color:#78716c;font-family:inherit;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:.5rem 0 .5rem .5rem;cursor:pointer;min-height:44px;
  flex-shrink:0;
}
.dir-btn:active{color:#f5b840}
.dir-dest{color:#f5b840;font-weight:700}

/* Status — minimal dot in header */
.status-dot{
  width:5px;height:5px;border-radius:50%;
  background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.7);
  display:inline-block;margin-right:.4rem;vertical-align:middle;
  animation:blink 3s infinite;cursor:pointer;flex-shrink:0;
}
.status-dot.loading{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.7)}
.status-dot.error{background:#dc2626;box-shadow:0 0 6px rgba(220,38,38,.7);animation:none}
@keyframes blink{0%,90%,100%{opacity:1}95%{opacity:.3}}

/* Departure rows */
.dep-row{
  display:grid;
  grid-template-columns:3.8rem 1fr 2.6rem;
  gap:.75rem;align-items:center;
  padding:.85rem .25rem .85rem .6rem;
  border-left:2px solid transparent;
  border-bottom:1px solid rgba(245,184,64,.05);
  cursor:pointer;transition:background .1s;
  position:relative;
}
.dep-row:active{background:rgba(245,184,64,.04)}
.dep-row.missed{opacity:.4;border-left-color:rgba(220,38,38,.3)}
.dep-row.cancelled{opacity:.2;pointer-events:none}
.dep-row.r-ok  {border-left-color:rgba(74,222,128,.4)}
.dep-row.r-soon{border-left-color:rgba(251,191,36,.6)}
.dep-row.r-now {border-left-color:#f97316}

.dep-mins{
  text-align:right;font-family:"Bebas Neue",sans-serif;
  font-size:2.4rem;line-height:1;color:#f5b840;
  text-shadow:0 0 12px rgba(245,184,64,.45);
  font-variant-numeric:tabular-nums;letter-spacing:-.02em;
}
.dep-mins.urgent{color:#fbbf24;text-shadow:0 0 18px rgba(251,191,36,.7)}
.dep-mins.now{font-size:1.8rem}
.dep-mins .unit{
  display:block;font-family:"JetBrains Mono",monospace;
  font-size:9px;text-transform:uppercase;letter-spacing:.2em;
  color:#57534e;margin-top:.1rem;
}

.dep-mid{min-width:0}
.dep-top{display:flex;align-items:center;gap:.45rem;margin-bottom:.2rem;flex-wrap:nowrap;overflow:hidden}
.dep-dest{
  font-size:14px;font-weight:700;color:#f5b840;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.dep-arr{font-size:11px;color:#78716c;white-space:nowrap;flex-shrink:0}
.dep-reach{font-size:11px;margin-top:.1rem}
.dep-reach.r-ok{color:rgba(74,222,128,.7)}
.dep-reach.r-soon{color:#fbbf24}
.dep-reach.r-now{color:#f97316;font-weight:700}
.dep-tag{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#fcd34d}
.dep-cancelled{font-size:9px;text-transform:uppercase;letter-spacing:.15em;color:#fca5a5}

.dep-spor{
  text-align:center;
  border-left:1px solid rgba(245,184,64,.08);
  padding-left:.4rem;
}
.dep-spor .sl{font-size:7px;text-transform:uppercase;letter-spacing:.2em;color:#57534e;margin-bottom:.15rem}
.dep-spor .sn{font-family:"Bebas Neue",sans-serif;font-size:1.5rem;color:#f5b840;line-height:1;text-shadow:0 0 8px rgba(245,184,64,.35)}

/* Empty / error states */
.state-msg{
  padding:3rem 0;text-align:center;
  font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:#57534e;
}

/* ── SCREEN 2a: VELG AVGANG ── */
.screen-header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:.75rem;margin-bottom:1.5rem;
  border-bottom:1px solid rgba(245,184,64,.08);
}
.screen-label{font-size:10px;text-transform:uppercase;letter-spacing:.25em;color:#57534e}

/* Train summary chip */
.train-chip{
  display:flex;align-items:center;gap:.6rem;
  background:rgba(245,184,64,.05);
  border:1px solid rgba(245,184,64,.12);
  border-radius:6px;padding:.7rem .9rem;
  margin-bottom:1.75rem;
}
.train-chip .tc-dest{font-size:14px;font-weight:700;color:#f5b840;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.train-chip .tc-meta{font-size:11px;color:#78716c;white-space:nowrap}
.train-chip .tc-meta span{color:#a8a29e}

/* Hero: gå senest */
.leaveby-hero{text-align:center;margin-bottom:2rem}
.leaveby-label{font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:#78716c;margin-bottom:.35rem}
.leaveby-time{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(3.5rem,16vw,5rem);
  line-height:1;letter-spacing:.04em;
  font-variant-numeric:tabular-nums;
  transition:color .3s;
}
.leaveby-time.lt-ok{color:#f5b840;text-shadow:0 0 24px rgba(245,184,64,.45),0 0 60px rgba(245,184,64,.15)}
.leaveby-time.lt-soon{color:#fbbf24;text-shadow:0 0 28px rgba(251,191,36,.55),0 0 60px rgba(251,191,36,.2)}
.leaveby-time.lt-now{color:#f97316;text-shadow:0 0 32px rgba(249,115,22,.6),0 0 70px rgba(249,115,22,.2)}
.leaveby-time.lt-late{color:#dc2626;text-shadow:0 0 20px rgba(220,38,38,.4)}
.leaveby-sub{font-size:12px;margin-top:.5rem}

/* Journey detail */
.journey-detail{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:rgba(245,184,64,.08);border-radius:6px;overflow:hidden;
  margin-bottom:1.75rem;
}
.jd-cell{background:#0a0806;padding:.8rem 1rem}
.jd-label{font-size:9px;text-transform:uppercase;letter-spacing:.25em;color:#57534e;margin-bottom:.3rem}
.jd-val{font-family:"Bebas Neue",sans-serif;font-size:2rem;line-height:1;font-variant-numeric:tabular-nums}
.jd-val.departure{color:#f5b840}
.jd-val.arrival{color:#fbbf24}
.jd-sub{font-size:10px;color:#78716c;margin-top:.2rem}

/* CTA */
.cta-btn{
  width:100%;padding:1.1rem;
  font-family:"Bebas Neue",sans-serif;font-size:1.5rem;letter-spacing:.1em;
  color:#0a0806;background:#f5b840;
  border:none;border-radius:6px;cursor:pointer;
  transition:background .1s, opacity .1s;
  display:block;
}
.cta-btn:active{background:#fbbf24}
.cta-btn:disabled{opacity:.3;cursor:default}
.cta-btn.secondary{
  background:none;border:1px solid rgba(245,184,64,.25);
  color:#78716c;margin-top:.6rem;font-size:1.1rem;
}
.cta-btn.secondary:active{background:rgba(245,184,64,.06);color:#f5b840}

/* ── SCREEN 2b: GANGE-MODUS ── */
.train-bar{
  display:flex;align-items:center;gap:.6rem;
  padding:.5rem 0 .75rem;
  border-bottom:1px solid rgba(245,184,64,.08);
  margin-bottom:2rem;
}
.train-bar .tb-dest{font-size:12px;color:#a8a29e;flex:1}
.train-bar .tb-dep{font-size:12px;color:#78716c}
.train-bar .tb-dep span{color:#f5b840}

.walk-center{text-align:center;padding:1rem 0 1.5rem}
.walk-num{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(5.5rem,22vw,8rem);
  line-height:.95;
  font-variant-numeric:tabular-nums;
  letter-spacing:-.02em;
  transition:color .5s, text-shadow .5s;
}
.walk-num.calm{color:#f5b840;text-shadow:0 0 28px rgba(245,184,64,.35),0 0 70px rgba(245,184,64,.12)}
.walk-num.soon{color:#fbbf24;text-shadow:0 0 36px rgba(251,191,36,.5),0 0 80px rgba(251,191,36,.15)}
.walk-num.urgent{color:#fbbf24;text-shadow:0 0 44px rgba(251,191,36,.65),0 0 90px rgba(251,191,36,.2);animation:throb .9s infinite}
.walk-num.gonow{color:#f97316;text-shadow:0 0 50px rgba(249,115,22,.75),0 0 100px rgba(249,115,22,.25);animation:throb .5s infinite}
.walk-num.here{color:#4ade80;text-shadow:0 0 36px rgba(74,222,128,.55),0 0 80px rgba(74,222,128,.18)}
@keyframes throb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.88;transform:scale(.975)}}

.walk-label{
  font-size:11px;text-transform:uppercase;letter-spacing:.3em;
  margin-top:.5rem;transition:color .3s;
}
.walk-label.calm,.walk-label.soon,.walk-label.urgent{color:#78716c}
.walk-label.gonow{color:rgba(249,115,22,.8)}
.walk-label.here{color:rgba(74,222,128,.7)}

.walk-context{
  font-size:12px;color:#78716c;margin-top:.75rem;line-height:1.6;
}
.walk-context .wc-hl{color:#f5b840}
.walk-context .wc-arr{color:#fbbf24}

/* seconds ring when urgent */
.secs-bar{
  font-size:11px;color:#57534e;margin-top:.4rem;
  font-variant-numeric:tabular-nums;
}

/* ── SCREEN 3: TRACKING ── */
.track-center{text-align:center;padding:1.5rem 0 1rem}
.track-num{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(5rem,20vw,7.5rem);
  line-height:1;color:#f5b840;
  text-shadow:0 0 32px rgba(245,184,64,.45),0 0 80px rgba(245,184,64,.15);
  letter-spacing:-.02em;font-variant-numeric:tabular-nums;
  transition:color .3s;
}
.track-num.urgent{color:#fbbf24;text-shadow:0 0 44px rgba(251,191,36,.65),0 0 100px rgba(251,191,36,.2);animation:throb 1s infinite}
.track-num.arrived{color:#4ade80;text-shadow:0 0 36px rgba(74,222,128,.55),0 0 80px rgba(74,222,128,.2);font-size:clamp(2.5rem,10vw,4rem)}
.track-num-label{font-size:11px;text-transform:uppercase;letter-spacing:.3em;color:#78716c;margin-top:.3rem}
.track-arr-clock{
  font-family:"Bebas Neue",sans-serif;font-size:2rem;
  color:#fbbf24;text-align:center;letter-spacing:.04em;
  margin-top:.5rem;font-variant-numeric:tabular-nums;
  text-shadow:0 0 16px rgba(251,191,36,.5);
}
.track-arr-label{font-size:9px;text-transform:uppercase;letter-spacing:.25em;color:#57534e;text-align:center;margin-top:.15rem}

/* Stop list */
.stops{margin-top:1.25rem;border-top:1px solid rgba(245,184,64,.08)}
.stop{
  display:flex;align-items:center;
  padding:.55rem .25rem;
  border-bottom:1px solid rgba(245,184,64,.04);
  font-size:11px;color:#57534e;
}
.stop.next{color:#f5b840;background:rgba(245,184,64,.03)}
.stop.dest{color:#fbbf24;font-weight:700;font-size:12px;background:rgba(251,191,36,.05)}
.stop-dot{width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:.65rem;flex-shrink:0;opacity:.4}
.stop.next .stop-dot,.stop.dest .stop-dot{opacity:1}
.stop-name{flex:1}
.stop-tag{font-size:8px;text-transform:uppercase;letter-spacing:.2em;margin-right:.4rem;opacity:.8}
.stop-clock{font-variant-numeric:tabular-nums;margin-left:.75rem;flex-shrink:0}
.stop-rel{font-variant-numeric:tabular-nums;margin-left:.5rem;min-width:4.5rem;text-align:right;font-size:10px;opacity:.7}
.stop.next .stop-rel,.stop.dest .stop-rel{opacity:1}

/* ── DEBUG (hidden by default, dot tap) ── */
.debug-panel{
  margin-top:2rem;padding:.85rem;
  background:rgba(245,184,64,.03);
  border:1px solid rgba(245,184,64,.1);
  border-radius:6px;font-size:10px;color:#78716c;line-height:1.6;
}
.debug-label{font-size:9px;text-transform:uppercase;letter-spacing:.2em;opacity:.6;margin-bottom:.4rem}
.log-wrap{max-height:10rem;overflow-y:auto}
.le{word-break:break-word;font-size:9.5px}.le .ts{opacity:.4}
.le.ok{color:#4ade80}.le.err{color:#fca5a5}
.dbg-row{display:flex;gap:.5rem;margin-top:.6rem}
input[type=text]{
  flex:1;padding:.3rem .5rem;font-size:10px;
  background:rgba(0,0,0,.4);border:1px solid rgba(245,184,64,.15);
  color:#f5b840;font-family:inherit;border-radius:3px;-webkit-appearance:none;
}
.sbtn{
  padding:.3rem .7rem;font-size:9px;text-transform:uppercase;letter-spacing:.15em;
  background:rgba(245,184,64,.1);border:1px solid rgba(245,184,64,.2);
  color:#f5b840;font-family:inherit;border-radius:3px;cursor:pointer;white-space:nowrap;
}
.sbtn:active{background:rgba(245,184,64,.25)}
.dbg-sec{margin-top:.75rem;padding-top:.75rem;border-top:1px solid rgba(245,184,64,.08)}
</style>
</head>
<body>
<div class="wrap">

<!-- ══ 1: BOARD ══ -->
<div id="v-board">
  <div class="board-header">
    <div style="display:flex;align-items:center;gap:.6rem">
      <span class="status-dot" id="status-dot" title="trykk for logg"></span>
      <span class="station-name" id="station-name">MORTENSRUD</span>
    </div>
    <button class="dir-btn" id="dir-btn" type="button">
      ⇄&nbsp;<span class="dir-dest" id="dir-dest">Jernbanetorget</span>
    </button>
  </div>
  <div id="board-error" style="display:none;padding:.6rem;margin:.5rem 0;font-size:11px;color:#fca5a5;background:rgba(220,38,38,.08);border-radius:4px"></div>
  <div id="onboard-chip" onclick="jny&&activateTracking()" style="display:none;align-items:center;padding:.6rem .75rem;margin:.5rem 0;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:6px;cursor:pointer;gap:.5rem"></div>
  <div id="dep-list"></div>
</div>

<!-- ══ 2a: VELG AVGANG ══ -->
<div id="v-selected" style="display:none">
  <div class="screen-header">
    <button class="nav-back" id="s-back">← avganger</button>
    <span class="screen-label">velg avgang</span>
  </div>
  <div id="s-content"></div>
</div>

<!-- ══ 2b: GANGE-MODUS ══ -->
<div id="v-walk" style="display:none">
  <div class="screen-header">
    <button class="nav-back" id="w-back">← avgang</button>
    <span class="screen-label">gange-modus</span>
  </div>
  <div class="train-bar" id="w-train-bar"></div>
  <div class="walk-center" id="w-center"></div>
  <div id="w-board-btn-wrap" style="display:none">
    <button class="cta-btn" onclick="doBoard()">bord →</button>
  </div>
</div>

<!-- ══ 3: TRACKING ══ -->
<div id="v-track" style="display:none">
  <div class="screen-header">
    <button class="nav-back" id="alight-btn">← avbord</button>
    <span class="screen-label">ombord</span>
  </div>
  <div class="train-bar" id="t-train-bar"></div>
  <div class="track-center">
    <div class="track-num" id="t-num">—</div>
    <div class="track-num-label" id="t-lbl">min til ankomst</div>
  </div>
  <div class="track-arr-clock" id="t-clock"></div>
  <div class="track-arr-label" id="t-label"></div>
  <div class="stops" id="t-stops"></div>
</div>

<!-- ══ DEBUG (hidden) ══ -->
<div class="debug-panel" id="debug-panel" style="display:none">
  <div class="debug-label">logg</div>
  <div class="log-wrap" id="log"></div>
  <div class="dbg-sec">
    <div class="debug-label">stop id</div>
    <div class="dbg-row">
      <input type="text" id="stop-input" placeholder="NSR:StopPlace:XXXX" autocapitalize="off" spellcheck="false">
      <button class="sbtn" id="stop-set">bytt</button>
    </div>
  </div>
  <div class="dbg-sec">
    <div class="debug-label">gangtid (min) — blank = beregn</div>
    <div class="dbg-row">
      <input type="text" id="walk-input" placeholder="eks. 8" autocomplete="off">
      <button class="sbtn" id="walk-set">sett</button>
    </div>
    <div id="walk-dbg" style="margin-top:.3rem;font-size:9px;opacity:.5"></div>
  </div>
</div>

</div><!-- .wrap -->

<script>
(function(){
// ── Config ──────────────────────────────────────────────────────
var ENTUR_JP = 'https://api.entur.io/journey-planner/v3/graphql';
var ENTUR_GC = 'https://api.entur.io/geocoder/v1/autocomplete';
var LINE     = '3';
var HOME_Q   = 'Stenbråtveien 81 Oslo';
var HOME_LBL = 'Stenbråtveien 81';
var DEFAULT_WALK = 8; // fallback minutes

var DIRS = [
  { key:'out', from:'Mortensrud',     to:'Jernbanetorget',
    stopId:'NSR:StopPlace:5687', filter:null,            geo:null },
  { key:'in',  from:'Jernbanetorget', to:'Mortensrud',
    stopId:null,                 filter:/mortensrud/i,   geo:'Jernbanetorget' }
];

// ── State ────────────────────────────────────────────────────────
var view = 'board';
var dIdx = 0;
var deps = [];
var sel  = null;
var jny  = null;
var lastFetch = null;
var bInterval = null;
var tInterval = null;
var selInterval = null;
var seq = 0;
var homeLL  = null;
var statLL  = {};
var walkOvr = null;
var debugOpen = false;

try { dIdx = Math.min(parseInt(localStorage.getItem('t.dir')||'0',10), DIRS.length-1); } catch(e){}

// ── Helpers ──────────────────────────────────────────────────────
var pad = function(n){ return String(n).padStart(2,'0'); };
var clk = function(v){ var d=new Date(v); return pad(d.getHours())+':'+pad(d.getMinutes()); };
var ts  = function(){ var d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()); };
function haver(la1,lo1,la2,lo2){
  var R=6371000,r=Math.PI/180,dL=(la2-la1)*r,dN=(lo2-lo1)*r;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dN/2)*Math.sin(dN/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function walkInfo(){
  if(walkOvr!==null) return { mins:walkOvr, src:'manuelt' };
  var sc=statLL[DIRS[dIdx].key];
  if(homeLL&&sc){ var d=haver(homeLL.lat,homeLL.lon,sc.lat,sc.lon); return { mins:Math.max(1,Math.ceil(d*1.3/83.3))+1, dist:Math.round(d), src:'beregnet' }; }
  return { mins:DEFAULT_WALK, src:'standard' };
}
// mToLeave: minutes until user must start walking
function mToLeave(depTs){
  var w=walkInfo();
  return Math.floor((depTs - w.mins*60000 - Date.now())/60000);
}
function reachCls(mtl){
  if(mtl>5)  return 'r-ok';
  if(mtl>1)  return 'r-soon';
  if(mtl>=0) return 'r-now';
  return 'missed';
}
function findArr(calls,name){
  if(!calls) return null;
  var n=name.toLowerCase();
  for(var i=0;i<calls.length;i++){
    var nm=(calls[i].quay&&calls[i].quay.stopPlace&&calls[i].quay.stopPlace.name)||'';
    if(nm.toLowerCase()===n) return calls[i];
  }
  return null;
}

// ── Logging ──────────────────────────────────────────────────────
function log(msg,kind){
  var el=document.getElementById('log');
  var d=document.createElement('div');
  d.className='le '+(kind||'');
  d.innerHTML='<span class="ts">'+ts()+'</span> '+msg;
  el.insertBefore(d,el.firstChild);
  while(el.children.length>30) el.removeChild(el.lastChild);
}

// ── Status dot ───────────────────────────────────────────────────
function setDot(s){
  var d=document.getElementById('status-dot');
  d.className='status-dot'+(s==='error'?' error':s==='loading'?' loading':'');
}

// ── View management ──────────────────────────────────────────────
function show(id){
  ['v-board','v-selected','v-walk','v-track'].forEach(function(v){
    document.getElementById(v).style.display=(v===id?'block':'none');
  });
  view=id.replace('v-','');
}

// ── GraphQL ──────────────────────────────────────────────────────
function boardGQL(id,n){
  return '{stopPlace(id:"'+id+'"){id name latitude longitude '
    +'estimatedCalls(numberOfDepartures:'+(n||10)+',whiteListedModes:[metro]){'
    +'realtime aimedDepartureTime expectedDepartureTime cancellation '
    +'destinationDisplay{frontText} quay{id publicCode name} '
    +'serviceJourney{id line{publicCode presentation{colour}} '
    +'estimatedCalls{quay{stopPlace{name}} '
    +'aimedArrivalTime expectedArrivalTime aimedDepartureTime expectedDepartureTime}}'
    +'}'
    +'}}';
}
function trackGQL(jid){
  return '{serviceJourney(id:"'+jid+'"){'
    +'estimatedCalls{quay{stopPlace{name}} '
    +'aimedArrivalTime expectedArrivalTime aimedDepartureTime expectedDepartureTime realtime}}}';
}

// ── RENDER 1: BOARD ──────────────────────────────────────────────
function renderBoard(){
  var list=document.getElementById('dep-list');
  var dir=DIRS[dIdx];
  if(!deps.length){
    list.innerHTML='<div class="state-msg">'+(view==='board'?'kobler til…':'ingen avganger')+'</div>';
    return;
  }
  var now=Date.now();
  var isOut=dir.key==='out';
  var wk=isOut?walkInfo():null;
  var html='';
  deps.forEach(function(c,i){
    var depTs=new Date(c.expectedDepartureTime).getTime();
    var diffSec=Math.floor((depTs-now)/1000);
    var mins=Math.floor(diffSec/60), secs=diffSec%60;
    var isNow=mins<=0, urgent=mins<=2;
    var ln=c.serviceJourney&&c.serviceJourney.line;
    var lc=(ln&&ln.publicCode)||'?';
    var lbg=ln&&ln.presentation&&ln.presentation.colour?'#'+ln.presentation.colour:'#7c2d12';
    var dest=(c.destinationDisplay&&c.destinationDisplay.frontText)||'';
    var quay=(c.quay&&c.quay.publicCode)||(c.quay&&c.quay.name?c.quay.name.replace(/^.*?\s/,''):'?');
    var delayed=c.realtime&&depTs-new Date(c.aimedDepartureTime).getTime()>60000;
    var sjc=c.serviceJourney&&c.serviceJourney.estimatedCalls;
    var arr=findArr(sjc,dir.to);
    var arrT=arr&&(arr.expectedArrivalTime||arr.aimedArrivalTime);

    var mtl=isOut?mToLeave(depTs):null;
    var rcls=isOut?reachCls(mtl):null;
    var isCancelled=c.cancellation;
    var missed=rcls==='missed';
    var rowCls='dep-row'+(isCancelled?' cancelled':missed?' missed':rcls?' '+rcls:'');

    html+='<div class="'+rowCls+'"'+(isCancelled?'':' onclick="tap('+i+')"')+'>'
      // Minutes column
      +'<div class="dep-mins'+(urgent?' urgent':'')+(isNow?' now':'')+'">'
      +(isNow?'NÅ':String(mins))
      +(isNow&&secs>0?'<span class="unit">'+secs+'s</span>':'')
      +(!isNow?'<span class="unit">min</span>':'')
      +'</div>'
      // Middle column
      +'<div class="dep-mid">'
      +'<div class="dep-top">'
      +'<span class="line-badge" style="background:'+lbg+'">'+lc+'</span>'
      +'<span class="dep-dest">'+dest+'</span>'
      +(arrT?'<span class="dep-arr">ank.'+clk(arrT)+'</span>':'')
      +(delayed?'<span class="dep-tag">+forsinkelse</span>':'')
      +(c.cancellation?'<span class="dep-cancelled">innstilt</span>':'')
      +'</div>'
      // Reachability line — only outbound, only if meaningful
      +(isOut&&rcls&&!missed
        ?'<div class="dep-reach '+rcls+'">'
          +(rcls==='r-ok'?'gå om '+mtl+' min'
          :rcls==='r-soon'?'gå om '+mtl+' min!'
          :'gå nå!')
          +'</div>'
        :'')
      +'</div>'
      // Track column
      +'<div class="dep-spor"><div class="sl">spor</div><div class="sn">'+quay+'</div></div>'
      +'</div>';
  });
  list.innerHTML=html;
}

// ── RENDER 2a: VELG AVGANG ───────────────────────────────────────
function renderSelected(){
  var c=sel; if(!c) return;
  var dir=DIRS[dIdx];
  var now=Date.now();
  var ln=c.serviceJourney&&c.serviceJourney.line;
  var lc=(ln&&ln.publicCode)||LINE;
  var lbg=ln&&ln.presentation&&ln.presentation.colour?'#'+ln.presentation.colour:'#7c2d12';
  var dest=(c.destinationDisplay&&c.destinationDisplay.frontText)||'';
  var quay=(c.quay&&c.quay.publicCode)||'?';
  var depTs=new Date(c.expectedDepartureTime).getTime();
  var sjc=c.serviceJourney&&c.serviceJourney.estimatedCalls;
  var arr=findArr(sjc,dir.to);
  var arrT=arr&&(arr.expectedArrivalTime||arr.aimedArrivalTime);
  var tmin=arrT?Math.round((new Date(arrT).getTime()-depTs)/60000):null;
  var delayed=c.realtime&&depTs-new Date(c.aimedDepartureTime).getTime()>60000;
  var wk=walkInfo();
  var leaveByTs=depTs-wk.mins*60000;
  var mtl=mToLeave(depTs);
  var rcls=reachCls(mtl);
  var ltCls=rcls==='r-ok'?'lt-ok':rcls==='r-soon'?'lt-soon':rcls==='r-now'?'lt-now':'lt-late';
  var urgMsg;
  if(rcls==='missed') urgMsg='<span style="color:#dc2626">Rakker ikke — velg neste avgang</span>';
  else if(rcls==='r-now') urgMsg='<span class="go">Gå nå!</span>';
  else if(mtl===1) urgMsg='Gå om <span class="warn">1 min</span>';
  else urgMsg='Gå om <span class="amber">'+mtl+' min</span>';

  var isOut=dir.key==='out';

  var html=''
    +'<div class="train-chip">'
    +'<span class="line-badge" style="background:'+lbg+'">'+lc+'</span>'
    +'<span class="tc-dest">'+dest+'</span>'
    +'<span class="tc-meta">spor <span>'+quay+'</span>'+(delayed?' · <span style="color:#fcd34d">forsinket</span>':'')+'</span>'
    +'</div>'
    // Hero leaveby — outbound only
    +(isOut
      ?'<div class="leaveby-hero">'
      +'<div class="leaveby-label">gå senest</div>'
      +'<div class="leaveby-time '+ltCls+'">'+clk(leaveByTs)+'</div>'
      +'<div class="leaveby-sub soft">'+urgMsg+'</div>'
      +'</div>'
      :'')
    // Journey detail
    +'<div class="journey-detail">'
    +'<div class="jd-cell">'
    +'<div class="jd-label">avgår fra '+dir.from.toLowerCase()+'</div>'
    +'<div class="jd-val departure">'+clk(c.expectedDepartureTime)+'</div>'
    +(delayed?'<div class="jd-sub">rute '+clk(c.aimedDepartureTime)+'</div>':'')
    +'</div>'
    +(arrT
      ?'<div class="jd-cell">'
      +'<div class="jd-label">ankommer '+dir.to.toLowerCase()+'</div>'
      +'<div class="jd-val arrival">'+clk(arrT)+'</div>'
      +(tmin?'<div class="jd-sub">'+tmin+' min reise</div>':'')
      +'</div>'
      :'')
    +'</div>';

  document.getElementById('s-content').innerHTML=html;

  // CTAs
  var existingCtas=document.getElementById('s-ctas');
  if(existingCtas) existingCtas.remove();
  var ctaDiv=document.createElement('div');
  ctaDiv.id='s-ctas';
  var isOut=dir.key==='out';
  var primaryBtn=document.createElement('button');
  primaryBtn.className='cta-btn';
  if(isOut){
    primaryBtn.textContent='gange-modus →';
    primaryBtn.disabled=depTs<now-120000;
    primaryBtn.onclick=function(){ show('v-walk'); buildWalkBar(); renderWalk(); };
  }else{
    primaryBtn.textContent='bord →';
    primaryBtn.disabled=depTs<now-120000;
    primaryBtn.onclick=function(){ window.doBoard(); };
  }
  ctaDiv.appendChild(primaryBtn);
  var backBtn=document.createElement('button');
  backBtn.className='cta-btn secondary';
  backBtn.textContent='andre avganger';
  backBtn.onclick=function(){ stopSelRefresh(); sel=null; show('v-board'); startBoard(); };
  ctaDiv.appendChild(backBtn);
  document.getElementById('v-selected').appendChild(ctaDiv);
}

// ── RENDER 2b: GANGE-MODUS ───────────────────────────────────────
function buildWalkBar(){
  var c=sel; if(!c) return;
  var dir=DIRS[dIdx];
  var ln=c.serviceJourney&&c.serviceJourney.line;
  var lc=(ln&&ln.publicCode)||LINE;
  var lbg=ln&&ln.presentation&&ln.presentation.colour?'#'+ln.presentation.colour:'#7c2d12';
  var dest=(c.destinationDisplay&&c.destinationDisplay.frontText)||'';
  var sjc=c.serviceJourney&&c.serviceJourney.estimatedCalls;
  var arr=findArr(sjc,dir.to);
  var arrT=arr&&(arr.expectedArrivalTime||arr.aimedArrivalTime);
  document.getElementById('w-train-bar').innerHTML=
    '<span class="line-badge" style="background:'+lbg+'">'+lc+'</span>'
    +'<span class="tb-dest">'+dest+'</span>'
    +'<span class="tb-dep">avg <span>'+clk(c.expectedDepartureTime)+'</span>'
    +(arrT?' · ank <span>'+clk(arrT)+'</span>':'')+'</span>';
}

function renderWalk(){
  var c=sel; if(!c) return;
  var depTs=new Date(c.expectedDepartureTime).getTime();
  var now=Date.now();
  var depMinLeft=Math.floor((depTs-now)/60000);
  if(depMinLeft<-3){ show('v-board'); startBoard(); return; }
  var wk=walkInfo();
  var leaveByTs=depTs-wk.mins*60000;
  var msLeft=leaveByTs-now;
  var mtl=Math.floor(msLeft/60000);
  var stl=Math.floor((msLeft%60000)/1000);

  // Determine phase
  var phase;
  if(depMinLeft<=2)          phase='here';
  else if(mtl<=0)            phase='gonow';
  else if(mtl<=2)            phase='urgent';
  else if(mtl<=6)            phase='soon';
  else                        phase='calm';

  var showBoardBtn=true;
  var boardBtnSecondary=(phase==='calm'||phase==='soon');
  document.getElementById('w-board-btn-wrap').style.display='block';
  var bb=document.getElementById('w-board-btn-wrap').querySelector('button');
  if(bb) bb.className='cta-btn'+(boardBtnSecondary?' secondary':'');

  var numEl, lblEl, ctxEl, secsEl;

  if(phase==='here'){
    numEl='<div class="walk-num here">FREMME</div>';
    lblEl='<div class="walk-label here">Toget avgår '+(depMinLeft<=0?'nå':'om '+depMinLeft+' min')+'</div>';
    ctxEl='';secsEl='';
  } else if(phase==='gonow'){
    var lateMin=Math.abs(mtl);
    numEl='<div class="walk-num gonow">GÅ<br>NÅ</div>';
    lblEl='<div class="walk-label gonow">Toget avgår om '+depMinLeft+' min'+(lateMin>0?' · '+lateMin+' min sen':'')+'</div>';
    ctxEl='';secsEl='';
  } else {
    numEl='<div class="walk-num '+phase+'">'+mtl+'</div>';
    lblEl='<div class="walk-label '+phase+'">min til du bør gå</div>';
    ctxEl='<div class="walk-context">'
      +'Gå senest <span class="wc-hl">'+clk(leaveByTs)+'</span>'
      +(wk.dist?' · ~'+wk.dist+' m':'')
      +'<br>Toget avgår <span class="wc-hl">'+clk(c.expectedDepartureTime)+'</span>'
      +(findArr(c.serviceJourney&&c.serviceJourney.estimatedCalls,DIRS[dIdx].to)
        ?', ankommer <span class="wc-arr">'+clk(findArr(c.serviceJourney.estimatedCalls,DIRS[dIdx].to).expectedArrivalTime||findArr(c.serviceJourney.estimatedCalls,DIRS[dIdx].to).aimedArrivalTime)+'</span>'
        :'')
      +'</div>';
    secsEl=(phase==='urgent'&&stl>0)
      ?'<div class="secs-bar">'+stl+' sek igjen til du bør gå</div>'
      :'';
  }

  document.getElementById('w-center').innerHTML=numEl+lblEl+ctxEl+secsEl;
}

// ── RENDER 3: TRACKING ───────────────────────────────────────────
function renderTrack(){
  if(!jny) return;
  var now=Date.now();
  var destTs=jny.arrival?new Date(jny.arrival.time).getTime():null;
  var diffMs=destTs?destTs-now:null;
  var mLeft=diffMs!==null?Math.floor(diffMs/60000):null;
  var arrived=mLeft!==null&&mLeft<0;
  if(arrived&&diffMs!==null&&diffMs<-300000){ show('v-board'); startBoard(); return; }

  var nEl=document.getElementById('t-num');
  var lEl=document.getElementById('t-lbl');
  if(arrived){ nEl.textContent='ANKOMMET'; nEl.className='track-num arrived'; lEl.textContent=jny.dest; }
  else if(mLeft!==null){ nEl.textContent=mLeft; nEl.className='track-num'+(mLeft<=2?' urgent':''); lEl.textContent='min til ankomst'; }
  else{ nEl.textContent='—'; nEl.className='track-num'; lEl.textContent='venter på data'; }

  var cEl=document.getElementById('t-clock'), laEl=document.getElementById('t-label');
  if(jny.arrival){ cEl.textContent=jny.arrival.clk; laEl.textContent='ankommer '+jny.dest.toLowerCase(); }
  else{ cEl.textContent=''; laEl.textContent=''; }

  var stops=jny.stops||[], dn=jny.dest.toLowerCase(), first=false, html='';
  stops.forEach(function(s){
    var nm=(s.quay&&s.quay.stopPlace&&s.quay.stopPlace.name)||'?';
    var isDest=nm.toLowerCase()===dn;
    // Use departure time to determine if train has left this stop
    var depT=s.expectedDepartureTime||s.aimedDepartureTime;
    var passed=depT&&new Date(depT).getTime()<now-10000; // 10s grace
    if(passed&&!isDest) return;
    // Use arrival time for countdown display
    var arrT=s.expectedArrivalTime||s.aimedArrivalTime||depT;
    var arrTs=arrT?new Date(arrT).getTime():null;
    var isNext=!first&&!isDest; if(isNext)first=true;
    var ma=arrTs?Math.round((arrTs-now)/60000):null;
    var relTxt=ma===null?'—':ma<=0?'nå':ma===1?'1 min':'om '+ma+' min';
    html+='<div class="stop'+(isDest?' dest':isNext?' next':'')+'">'
      +'<div class="stop-dot"></div>'
      +'<div class="stop-name">'+(isDest?'<span class="stop-tag">stå av</span>':isNext?'<span class="stop-tag">neste</span>':'')+nm+'</div>'
      +'<div class="stop-clock">'+(arrT?clk(arrT):'—')+'</div>'
      +'<div class="stop-rel">'+relTxt+'</div>'
      +'</div>';
  });
  document.getElementById('t-stops').innerHTML=html||'<div class="state-msg" style="padding:1rem;font-size:11px">laster…</div>';
}

// ── Master render loop ────────────────────────────────────────────
function render(){
  var v=view;
  if(v==='board')    { renderBoard(); }
  else if(v==='selected') { renderSelected(); }
  else if(v==='walk')   { renderWalk(); }
  else               { renderTrack(); }
}
setInterval(render,1000);

// ── Data: board ───────────────────────────────────────────────────
function resolveStop(dir){
  if(dir.stopId) return Promise.resolve(dir.stopId);
  return fetch(ENTUR_GC+'?text='+encodeURIComponent(dir.geo)+'&size=10&layers=venue')
    .then(function(r){return r.json();})
    .then(function(json){
      var ff=(json&&json.features)||[];
      var q=dir.geo.toLowerCase();
      var m=ff.find(function(f){
        return(f.properties.category||[]).indexOf('metroStation')!==-1
          &&(f.properties.label||'').toLowerCase().indexOf(q)!==-1;
      })||ff.find(function(f){return(f.properties.label||'').toLowerCase().indexOf(q)!==-1;});
      if(!m) throw new Error('Fant ikke '+dir.geo);
      dir.stopId=m.properties.id; log('stop: '+dir.from+' = '+dir.stopId,'ok');
      return dir.stopId;
    });
}

function fetchBoard(){
  var dir=DIRS[dIdx], mySeq=++seq;
  setDot('loading');
  resolveStop(dir)
    .then(function(id){
      if(mySeq!==seq) return null;
      log('board → '+id);
      return fetch(ENTUR_JP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:boardGQL(id, dir.key==='in'?35:12)})});
    })
    .then(function(r){if(!r||mySeq!==seq)return null; log('← '+r.status); if(!r.ok)throw new Error('HTTP '+r.status); return r.json();})
    .then(function(j){
      if(!j||mySeq!==seq)return;
      if(j.errors)throw new Error(j.errors[0].message);
      var stop=j.data&&j.data.stopPlace; if(!stop)throw new Error('Ingen data');
      if(stop.latitude&&stop.longitude){ statLL[dir.key]={lat:stop.latitude,lon:stop.longitude}; updateWalkDbg(); }
      var raw=stop.estimatedCalls||[];
      var byL=raw.filter(function(c){var l=c.serviceJourney&&c.serviceJourney.line;return l&&l.publicCode===LINE;});
      var byD=dir.filter?byL.filter(function(c){return dir.filter.test((c.destinationDisplay&&c.destinationDisplay.frontText)||'');}):byL;
      log('✓ '+byD.length+'/'+raw.length+' L'+LINE,'ok');
      deps=byD; lastFetch=Date.now();
      document.getElementById('board-error').style.display='none';
      setDot('ok');
      if(view==='board') renderBoard();
    })
    .catch(function(err){
      if(mySeq!==seq)return; log('✗ '+err.message,'err'); setDot('error');
      var be=document.getElementById('board-error');
      be.style.display='block'; be.textContent=err.message;
    });
}

function startBoard(){
  deps=[]; if(bInterval)clearInterval(bInterval);
  fetchBoard();
  bInterval=setInterval(fetchBoard,20000);
}

// ── Data: tracking ────────────────────────────────────────────────
function fetchTrack(){
  if(!jny||!jny.journeyId) return;
  fetch(ENTUR_JP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:trackGQL(jny.journeyId)})})
    .then(function(r){return r.json();})
    .then(function(j){
      var sj=j&&j.data&&j.data.serviceJourney; if(!sj)return;
      jny.stops=sj.estimatedCalls||[];
      var d=findArr(jny.stops,jny.dest);
      if(d){ var t=d.expectedArrivalTime||d.aimedArrivalTime; if(t){ jny.arrival={time:t,clk:clk(t)}; log('ank '+jny.arrival.clk,'ok'); } }
    })
    .catch(function(err){log('track ✗ '+err.message,'err');});
}

// ── Data: selected journey live refresh ───────────────────────────
function fetchSelJourney(){
  if(!sel||!sel.serviceJourney||!sel.serviceJourney.id) return;
  var jid=sel.serviceJourney.id;
  fetch(ENTUR_JP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:trackGQL(jid)})})
    .then(function(r){return r.json();})
    .then(function(j){
      var sj=j&&j.data&&j.data.serviceJourney; if(!sj||!sel)return;
      // Splice fresh estimatedCalls back onto the selected departure object
      sel.serviceJourney.estimatedCalls=sj.estimatedCalls||[];
      log('sel live: '+sel.serviceJourney.estimatedCalls.length+' stopp','ok');
    })
    .catch(function(err){log('sel ✗ '+err.message,'err');});
}
function startSelRefresh(){
  if(selInterval)clearInterval(selInterval);
  fetchSelJourney();
  selInterval=setInterval(fetchSelJourney,15000);
}
function stopSelRefresh(){
  if(selInterval){clearInterval(selInterval);selInterval=null;}
}

// ── User actions ──────────────────────────────────────────────────
window.tap=function(i){
  sel=deps[i]; if(!sel)return;
  if(bInterval){clearInterval(bInterval);bInterval=null;}
  show('v-selected');
  var old=document.getElementById('s-ctas'); if(old)old.remove();
  startSelRefresh();
  renderSelected();
};

window.doBoard=function(){
  var c=sel; if(!c)return;
  var dir=DIRS[dIdx];
  var sj=c.serviceJourney;
  var sjc=sj&&sj.estimatedCalls;
  var arr=findArr(sjc,dir.to);
  var lbg=sj&&sj.line&&sj.line.presentation&&sj.line.presentation.colour;
  jny={
    journeyId:sj&&sj.id||null,
    dest:dir.to,
    lineCode:(sj&&sj.line&&sj.line.publicCode)||LINE,
    lineBg:lbg?'#'+lbg:'#7c2d12',
    frontText:(c.destinationDisplay&&c.destinationDisplay.frontText)||dir.to,
    stops:sjc||[],
    boardedAt:Date.now(),
    arrival:arr&&(arr.expectedArrivalTime||arr.aimedArrivalTime)?
      {time:arr.expectedArrivalTime||arr.aimedArrivalTime,clk:clk(arr.expectedArrivalTime||arr.aimedArrivalTime)}:null,
  };
  saveJny();
  activateTracking();
};

// ── Journey persistence ───────────────────────────────────────────
function saveJny(){
  try{ localStorage.setItem('t.jny',JSON.stringify({
    journeyId:jny.journeyId,dest:jny.dest,
    lineCode:jny.lineCode,lineBg:jny.lineBg,
    frontText:jny.frontText,boardedAt:jny.boardedAt,
    arrival:jny.arrival
  }));}catch(e){}
}
function loadJny(){
  try{
    var raw=localStorage.getItem('t.jny');
    if(!raw)return null;
    var j=JSON.parse(raw);
    if(!j.boardedAt||Date.now()-j.boardedAt>4*60*60*1000){localStorage.removeItem('t.jny');return null;}
    return j;
  }catch(e){return null;}
}
function clearJny(){
  jny=null;
  try{localStorage.removeItem('t.jny');}catch(e){}
}
function activateTracking(){
  stopSelRefresh();
  buildTrackBar();
  log('ombord L'+jny.lineCode+' → '+jny.dest+(jny.arrival?' ('+jny.arrival.clk+')':''));
  sel=null;show('v-track');
  if(tInterval)clearInterval(tInterval);
  fetchTrack();
  tInterval=setInterval(fetchTrack,15000);
  if(bInterval)clearInterval(bInterval);
  updateOnboardChip();
}
function buildTrackBar(){
  document.getElementById('t-train-bar').innerHTML=
    '<span class="line-badge" style="background:'+jny.lineBg+'">'+jny.lineCode+'</span>'
    +'<span class="tb-dest">'+(jny.frontText||jny.dest)+'</span>'
    +(jny.arrival?'<span class="tb-dep">ank <span>'+jny.arrival.clk+'</span></span>':'');
}
function updateOnboardChip(){
  var chip=document.getElementById('onboard-chip');if(!chip)return;
  if(jny){
    chip.style.display='flex';
    chip.innerHTML=
      '<span class="line-badge" style="background:'+jny.lineBg+';margin-right:.5rem">'+jny.lineCode+'</span>'
      +'<span style="flex:1;font-size:11px;color:#a8a29e">ombord · mot '+(jny.frontText||jny.dest).toLowerCase()+'</span>'
      +(jny.arrival?'<span style="font-family:\'Bebas Neue\',sans-serif;font-size:1.1rem;color:#fbbf24;text-shadow:0 0 10px rgba(251,191,36,.5)">ank '+jny.arrival.clk+' →</span>':'');
  }else{chip.style.display='none';}
}

// ── Geocoding ─────────────────────────────────────────────────────
function geocodeHome(){
  log('geocoding "'+HOME_Q+'"');
  fetch(ENTUR_GC+'?text='+encodeURIComponent(HOME_Q)+'&size=10')
    .then(function(r){return r.json();})
    .then(function(j){
      var ff=(j&&j.features)||[];
      var f=ff.find(function(x){return x.properties.layer==='address'
        &&(x.properties.label||'').toLowerCase().indexOf('stenbr')!==-1;})
        ||ff[0];
      if(!f)throw new Error('Fant ikke hjemsted');
      var c=f.geometry.coordinates;
      homeLL={lat:c[1],lon:c[0]};
      log('✓ hjemsted '+homeLL.lat.toFixed(4)+','+homeLL.lon.toFixed(4),'ok');
      updateWalkDbg();
    })
    .catch(function(err){log('hjemsted: '+err.message,'err');});
}

function updateWalkDbg(){
  var el=document.getElementById('walk-dbg'); if(!el)return;
  var w=walkInfo();
  el.textContent=w.src+': ~'+w.mins+' min'+(w.dist?' ('+w.dist+' m)':'');
}

// ── Header / direction ────────────────────────────────────────────
function updateHeader(){
  var dir=DIRS[dIdx];
  document.getElementById('station-name').textContent=dir.from.toUpperCase();
  document.getElementById('dir-dest').textContent=dir.to;
  document.title=dir.from+' → '+dir.to;
}

document.getElementById('dir-btn').addEventListener('click',function(){
  dIdx=(dIdx+1)%DIRS.length;
  try{localStorage.setItem('t.dir',String(dIdx));}catch(e){}
  updateHeader(); deps=[]; show('v-board'); startBoard();
});

// ── Nav buttons ───────────────────────────────────────────────────
document.getElementById('s-back').addEventListener('click',function(){
  stopSelRefresh(); sel=null; show('v-board'); startBoard();
});
document.getElementById('w-back').addEventListener('click',function(){
  if(sel){ show('v-selected'); renderSelected(); }
  else{ show('v-board'); startBoard(); }
});
document.getElementById('alight-btn').addEventListener('click',function(){
  clearJny();
  if(tInterval)clearInterval(tInterval);
  updateOnboardChip();
  show('v-board'); startBoard();
});

// ── Status dot → toggle debug ─────────────────────────────────────
document.getElementById('status-dot').addEventListener('click',function(){
  debugOpen=!debugOpen;
  document.getElementById('debug-panel').style.display=debugOpen?'block':'none';
});

// ── Debug controls ────────────────────────────────────────────────
document.getElementById('stop-set').addEventListener('click',function(){
  var v=document.getElementById('stop-input').value.trim();
  if(v){DIRS[dIdx].stopId=v;log('stop overstyrt: '+v);fetchBoard();}
});
document.getElementById('walk-set').addEventListener('click',function(){
  var v=parseInt(document.getElementById('walk-input').value,10);
  walkOvr=(isNaN(v)||v<=0)?null:v;
  log('gangtid: '+(walkOvr!==null?walkOvr+' min':'reset til beregnet'));
  updateWalkDbg();
});

// ── Init ──────────────────────────────────────────────────────────
updateHeader();
geocodeHome();
var restored=loadJny();
if(restored){
  jny=restored;
  jny.stops=[];
  show('v-board');
  startBoard();
  activateTracking(); // goes straight to tracking
}else{
  show('v-board');
  startBoard();
}
})();
</script>
</body>
</html>
